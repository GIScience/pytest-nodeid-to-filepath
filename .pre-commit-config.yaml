ci:
  skip: [ty]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
      - id: ruff-format
        args: ["--check", "--diff"]
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check
        language: python
        types_or: [python]
